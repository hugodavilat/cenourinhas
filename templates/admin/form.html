{% extends 'base.html' %}
{% block title %}{{ title }} — Casamento Aline & Hugo{% endblock %}
{% block content %}
<div class="card-premium max-w-lg mx-auto" style="max-width: 600px; margin: 0 auto;">
  <h2 class="display-font fs-2 text-success-dark mb-4">{{ title }}</h2>
  
  <form method="post" class="mb-3">
    {% csrf_token %}
    <div class="form-wrapper">
      {{ form.as_p }}
    </div>
    
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-success rounded-pill px-4 py-2 text-uppercase fw-semibold" style="background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%); border: none; font-size: 0.9rem; letter-spacing: 0.05em;">
        Salvar Registro
      </button>
      <a href="{% url 'wedding_admin' %}" class="btn btn-outline-secondary rounded-pill px-4 py-2 text-uppercase fw-semibold" style="color: var(--text-muted); border-color: rgba(38,66,42,0.2); font-size: 0.9rem; letter-spacing: 0.05em;">
        Cancelar
      </a>
    </div>
  </form>
</div>

<style>
  .form-wrapper p {
    margin-bottom: 1.5rem;
  }
  
  .form-wrapper label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green-mid);
    margin-bottom: 0.5rem;
  }
  
  .form-wrapper input[type="text"],
  .form-wrapper input[type="number"],
  .form-wrapper input[type="url"],
  .form-wrapper input[type="email"],
  .form-wrapper select,
  .form-wrapper textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid rgba(38, 66, 42, 0.18);
    border-radius: 12px;
    background: var(--white-pale);
    color: var(--text-main);
    transition: all 0.2s;
    outline: none;
    font-family: 'Jost', sans-serif;
  }
  
  .form-wrapper input[type="text"]:focus,
  .form-wrapper input[type="number"]:focus,
  .form-wrapper input[type="url"]:focus,
  .form-wrapper input[type="email"]:focus,
  .form-wrapper select:focus,
  .form-wrapper textarea:focus {
    border-color: var(--green);
    background: var(--white-warm);
    box-shadow: 0 0 0 3px rgba(38, 66, 42, 0.08);
  }
  
  .form-wrapper input[type="checkbox"] {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid rgba(38, 66, 42, 0.25);
    accent-color: var(--green);
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  
  .form-wrapper .helptext {
    display: block;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    line-height: 1.4;
  }
</style>
{% endblock %}
