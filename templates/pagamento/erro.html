{% extends "base.html" %}

{% block title %}Erro no Pagamento — Aline & Hugo{% endblock %}

{% block content %}
<div class="card-premium max-w-lg mx-auto text-center" style="max-width: 600px; margin: 0 auto; padding: 3rem 2rem;">
  <div style="background: linear-gradient(135deg, var(--red) 0%, var(--red-light) 100%); 
              padding: 2.5rem 2rem; 
              border-radius: 20px; 
              color: var(--white-pale);
              margin-bottom: 2rem;
              box-shadow: 0 4px 18px rgba(152,66,22,0.25);">
    <svg style="width: 72px; height: 72px; margin: 0 auto 1.25rem; display: block;" 
         fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0-10.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.75c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.75h-.152c-3.196 0-6.1-1.249-8.25-3.286zm0 13.036h.008v.008H12v-.008z"></path>
    </svg>
    <h1 class="display-font" style="font-size: 2.2rem; margin: 0; font-weight: 500;">{{ titulo }}</h1>
  </div>

  <div style="background: rgba(152, 66, 22, 0.04); 
              padding: 2rem; 
              border-radius: 16px;
              border: 1px solid rgba(152, 66, 22, 0.15);
              margin-bottom: 2rem;">
    <p class="fs-5" style="color: var(--red); margin: 0; line-height: 1.6; font-weight: 500;">
      {{ mensagem }}
    </p>
  </div>

  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="{% url 'home' %}#presentes" 
       class="btn btn-danger rounded-pill px-4 py-2 text-uppercase fw-semibold"
       style="background: linear-gradient(135deg, var(--red) 0%, var(--red-light) 100%); border: none; font-size: 0.9rem; letter-spacing: 0.1em; transition: all 0.2s;">
      <i class="bi bi-arrow-repeat me-1"></i> Tentar Novamente
    </a>
    <a href="{% url 'home' %}" 
       class="btn btn-outline-secondary rounded-pill px-4 py-2 text-uppercase fw-semibold"
       style="color: var(--text-muted); border-color: rgba(38,66,42,0.2); font-size: 0.9rem; letter-spacing: 0.1em; transition: all 0.2s;">
      <i class="bi bi-house-door-fill me-1"></i> Voltar à Home
    </a>
  </div>

  <p style="margin-top: 2.5rem; color: var(--text-muted); font-size: 0.98rem;">
    Se você acredita que houve um equívoco ou o erro continuar, por favor, fale conosco.
  </p>
</div>
{% endblock %}
