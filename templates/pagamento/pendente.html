{% extends "base.html" %}

{% block title %}Pagamento Pendente — Aline & Hugo{% endblock %}

{% block content %}
<div class="card-premium max-w-lg mx-auto text-center" style="max-width: 600px; margin: 0 auto; padding: 3rem 2rem;">
  <div style="background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%); 
              padding: 2.5rem 2rem; 
              border-radius: 20px; 
              color: var(--white-pale);
              margin-bottom: 2rem;
              box-shadow: 0 4px 18px rgba(120,137,143,0.25);">
    <svg style="width: 72px; height: 72px; margin: 0 auto 1.25rem; display: block; animation: floatRings 2.5s ease-in-out infinite;" 
         fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <h1 class="display-font" style="font-size: 2.2rem; margin: 0; font-weight: 500;">{{ titulo }}</h1>
  </div>

  <div style="background: rgba(120, 137, 143, 0.05); 
              padding: 2rem; 
              border-radius: 16px;
              border: 1px solid rgba(120, 137, 143, 0.2);
              margin-bottom: 2rem;">
    <p class="fs-5" style="color: var(--text-main); margin: 0; line-height: 1.6;">
      {{ mensagem }}
    </p>
  </div>

  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="{% url 'home' %}#presentes" 
       class="btn btn-primary rounded-pill px-4 py-2 text-uppercase fw-semibold"
       style="background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%); border: none; font-size: 0.9rem; letter-spacing: 0.1em; transition: all 0.2s;">
      <i class="bi bi-gift-fill me-1"></i> Ver Presentes
    </a>
    <a href="{% url 'home' %}" 
       class="btn btn-outline-secondary rounded-pill px-4 py-2 text-uppercase fw-semibold"
       style="color: var(--text-muted); border-color: rgba(38,66,42,0.2); font-size: 0.9rem; letter-spacing: 0.1em; transition: all 0.2s;">
      <i class="bi bi-house-door-fill me-1"></i> Voltar à Home
    </a>
  </div>

  <p style="margin-top: 2.5rem; color: var(--text-muted); font-size: 0.98rem;">
    Você receberá uma confirmação assim que o Mercado Pago validar a operação. Obrigado!
  </p>
</div>

<style>
  @keyframes floatRings {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-4px); }
  }
</style>
{% endblock %}
